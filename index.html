<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="./icons/logo.svg" />
    <meta name="theme-color" content="#8B5CF6" />
    <link rel="apple-touch-icon" href="./icons/logo.svg" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>Routine Scrapper — Student & Class Manager</title>
    <meta name="description" content="Manage student details, class routines, and teacher information. Track running classes in real-time." />
    <meta name="keywords" content="student management, class routine, school manager, teacher database, class schedule" />
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Routine Scrapper — Student & Class Manager" />
    <meta property="og:description" content="Manage student details, class routines, and teacher information." />
    <meta property="og:image" content="https://potatameister.github.io/PaperKnife/icons/logo.svg" />

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:title" content="Routine Scrapper — Student & Class Manager" />
    <meta property="twitter:description" content="Manage student details, class routines, and teacher information." />
    <meta property="twitter:image" content="https://potatameister.github.io/PaperKnife/icons/logo.svg" />

    <script>
      (function() {
        const savedTheme = localStorage.getItem('theme');
        const systemDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        if (savedTheme === 'dark' || (!savedTheme && systemDark)) {
          document.documentElement.classList.add('dark');
          document.documentElement.style.colorScheme = 'dark';
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./src/main.tsx"></script>
  </body>
</html>
